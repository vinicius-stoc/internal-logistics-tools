{% extends "base.html" %}

{% block title %}Dashboard | Logística Interna{% endblock %}

{% block content %}
<div class="page-heading">
  <h1>Dashboard</h1>
  <p>Estrutura inicial preparada para filtros, cards e gráficos em etapa futura.</p>
</div>

<section class="border rounded p-3">
  <div class="row g-3">
    <div class="col-md-4">
      <label class="form-label" for="periodo">Período</label>
      <input class="form-control" id="periodo" type="text" disabled>
    </div>
    <div class="col-md-4">
      <label class="form-label" for="motorista">Motorista</label>
      <input class="form-control" id="motorista" type="text" disabled>
    </div>
    <div class="col-md-4">
      <label class="form-label" for="pauta">Pauta</label>
      <input class="form-control" id="pauta" type="text" disabled>
    </div>
  </div>
</section>

<section class="mt-3 border rounded p-3">
  <h2 class="h5">Área de indicadores</h2>
  <p class="text-muted mb-0">Sem dados analíticos nesta fase de setup.</p>
</section>
{% endblock %}
